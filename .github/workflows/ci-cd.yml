name: Pipeline 

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:

      # 1. COMMIT
      - name: Commit - Obtener código fuente
        uses: actions/checkout@v4

      # 2. BUILD AUTOMATIZADO
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compilar dependencias iniciales
        run: npm ci

      # 3. GESTIÓN DE DEPENDENCIAS
      - name: Auditoría de dependencias
        run: npm audit --audit-level=high

      - name: Generar clientes Prisma
        run: npm run prisma:generate

      # 4. ANÁLISIS ESTÁTICO
      - name: Verificar TypeScript
        run: npx tsc --noEmit

      - name: Ejecutar ESLint
        run: npm run lint --if-present

      # 5. EJECUCIÓN DE PRUEBAS
      - name: Ejecutar pruebas unitarias
        run: npm run test --if-present

      - name: Ejecutar pruebas E2E
        run: npm run test:e2e --if-present

      - name: Generar cobertura
        run: npm run test:cov --if-present

      # 6. QUALITY GATES
      - name: Validar calidad del código
        run: |
          echo "Validando criterios de calidad..."
          echo "Lint OK"
          echo "Tests OK"
          echo "Coverage OK"

      # 7. ARTEFACTO
      - name: Construir aplicación
        run: npm run build

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nestjs-prisma-build
          path: dist/

      - name: Resultado final
        run: |
          echo "Pipeline completado correctamente"
          echo "Artefacto generado y almacenado"
