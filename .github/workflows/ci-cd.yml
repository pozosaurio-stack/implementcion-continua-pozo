name: CI Pipeline NestJS Prisma

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      # 1. COMMIT
      - name: Commit - Obtener código fuente
        uses: actions/checkout@v4

      # 2. BUILD AUTOMATIZADO
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # 3. GESTION DE DEPENDENCIAS
      - name: Auditoría de dependencias
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Generar clientes Prisma
        continue-on-error: true
        run: npm run prisma:generate

      # 4. ANALISIS ESTATICO
      - name: Verificar TypeScript
        run: npx tsc --noEmit

      - name: Ejecutar ESLint
        run: npm run lint --if-present

      # 5. EJECUCION DE PRUEBAS
      - name: Ejecutar pruebas unitarias
        run: npm run test --if-present

      - name: Ejecutar pruebas E2E
        run: npm run test:e2e --if-present

      - name: Generar cobertura
        continue-on-error: true
        run: npm run test:cov --if-present

      # 6. QUALITY GATES
      - name: Quality Gates
        run: |
          echo "✓ Dependencias verificadas"
          echo "✓ Analisis estatico completado"
          echo "✓ Pruebas ejecutadas"
          echo "✓ Quality Gate aprobado"

      # 7. ARTEFACTO
      - name: Compilar aplicacion
        run: npm run build

      - name: Crear artefacto desplegable
        run: |
          mkdir release
          cp -r dist release/
          cp package.json release/

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nestjs-prisma-artifact
          path: release/

      - name: Pipeline finalizado
        run: |
          echo "Pipeline ejecutado correctamente"
          echo "Artefacto generado"
