name: CI Pipeline Demo

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. COMMIT
      - name: Commit - Obtener código fuente
        uses: actions/checkout@v4

      # 2. BUILD AUTOMATIZADO
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci || true

      # 3. GESTIÓN DE DEPENDENCIAS
      - name: Auditoría de dependencias
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Generar clientes Prisma
        continue-on-error: true
        run: npm run prisma:generate

      # 4. ANÁLISIS ESTÁTICO
      - name: Verificar TypeScript
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Ejecutar ESLint
        continue-on-error: true
        run: npm run lint --if-present

      # 5. EJECUCIÓN DE PRUEBAS
      - name: Ejecutar pruebas unitarias
        continue-on-error: true
        run: npm run test --if-present

      - name: Ejecutar pruebas E2E
        continue-on-error: true
        run: npm run test:e2e --if-present

      - name: Generar cobertura
        continue-on-error: true
        run: npm run test:cov --if-present

      # 6. QUALITY GATES
      - name: Quality Gates
        run: |
          echo "Evaluando calidad"
          echo "Pipeline continúa aunque existan advertencias"

      # 7. ARTEFACTO
      - name: Compilar aplicación
        continue-on-error: true
        run: npm run build

      - name: Crear carpeta release
        run: |
          mkdir -p release
          [ -d dist ] && cp -r dist release/ || echo "No existe dist"
          [ -f package.json ] && cp package.json release/

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifact
          path: release/

      - name: Pipeline finalizado
        run: echo "Pipeline completado"
